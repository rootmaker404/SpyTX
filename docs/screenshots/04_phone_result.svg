  <text x="168" y="308" fill="#7dd3fc" font-family="Consolas, monospace" font-size="18">"e164"</text>
  <text x="238" y="308" fill="#f8fafc" font-family="Consolas, monospace" font-size="18">: "+6281234567890",</text>
  <text x="168" y="344" fill="#7dd3fc" font-family="Consolas, monospace" font-size="18">"international"</text>
  <text x="326" y="344" fill="#f8fafc" font-family="Consolas, monospace" font-size="18">: "+62 812-3456-7890",</text>
  <text x="168" y="380" fill="#7dd3fc" font-family="Consolas, monospace" font-size="18">"region"</text>
  <text x="252" y="380" fill="#f8fafc" font-family="Consolas, monospace" font-size="18">: "ID",</text>
