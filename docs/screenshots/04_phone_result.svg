  <text x="238" y="452" fill="#f8fafc" font-family="Consolas, monospace" font-size="18">: true,</text>
  <text x="168" y="488" fill="#7dd3fc" font-family="Consolas, monospace" font-size="18">"location"</text>
  <text x="278" y="488" fill="#f8fafc" font-family="Consolas, monospace" font-size="18">: "Indonesia",</text>
  <text x="168" y="524" fill="#7dd3fc" font-family="Consolas, monospace" font-size="18">"scope"</text>
  <text x="242" y="524" fill="#f8fafc" font-family="Consolas, monospace" font-size="18">: "safe public phone metadata only"</text>
  <text x="136" y="560" fill="#f8fafc" font-family="Consolas, monospace" font-size="18">}</text>
  <text x="104" y="596" fill="#f8fafc" font-family="Consolas, monospace" font-size="18">}</text>
