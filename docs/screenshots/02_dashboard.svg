<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="SpyTX dashboard terminal screenshot">
  <rect width="1200" height="720" fill="#03070b"/>
  <rect x="28" y="24" width="1144" height="672" rx="10" fill="#071018" stroke="#263445" stroke-width="2"/>
  <rect x="28" y="24" width="1144" height="42" rx="10" fill="#111b27"/>
  <circle cx="56" cy="45" r="7" fill="#ff5f57"/>
  <circle cx="78" cy="45" r="7" fill="#ffbd2e"/>
  <circle cx="100" cy="45" r="7" fill="#28c840"/>
  <text x="600" y="51" fill="#9aa7b7" font-family="Consolas, monospace" font-size="15" text-anchor="middle">SpyTX Command Deck</text>
  <text x="72" y="112" fill="#f8fafc" font-family="Consolas, monospace" font-size="30" font-weight="700">SpyTX Command Deck</text>
  <text x="72" y="145" fill="#94a3b8" font-family="Consolas, monospace" font-size="17">public intelligence modules, terminal-first workflow</text>
  <g font-family="Consolas, monospace" font-size="18">
    <rect x="72" y="190" width="316" height="116" rx="6" fill="#0f1b28" stroke="#38a3ff"/>
    <text x="96" y="228" fill="#38a3ff" font-weight="700">[01] IP + GEO</text>
    <text x="96" y="262" fill="#d8e1ec">/ip /deepip /geo</text>
    <rect x="442" y="190" width="316" height="116" rx="6" fill="#0f1b28" stroke="#ff4f5e"/>
    <text x="466" y="228" fill="#ff4f5e" font-weight="700">[02] DOMAIN</text>
    <text x="466" y="262" fill="#d8e1ec">/domain /dns /ct</text>
    <rect x="812" y="190" width="316" height="116" rx="6" fill="#0f1b28" stroke="#f8fafc"/>
    <text x="836" y="228" fill="#f8fafc" font-weight="700">[03] WEB</text>
    <text x="836" y="262" fill="#d8e1ec">/webcheck /tls /rdap</text>
    <rect x="72" y="346" width="316" height="116" rx="6" fill="#0f1b28" stroke="#7dd3fc"/>
    <text x="96" y="384" fill="#7dd3fc" font-weight="700">[04] PHONE</text>
    <text x="96" y="418" fill="#d8e1ec">safe number metadata</text>
    <rect x="442" y="346" width="316" height="116" rx="6" fill="#0f1b28" stroke="#ff6f7a"/>
    <text x="466" y="384" fill="#ff6f7a" font-weight="700">[05] MAPS</text>
    <text x="466" y="418" fill="#d8e1ec">/bestgeo /map /copygeo</text>
    <rect x="812" y="346" width="316" height="116" rx="6" fill="#0f1b28" stroke="#94a3b8"/>
    <text x="836" y="384" fill="#94a3b8" font-weight="700">[06] RECORDS</text>
    <text x="836" y="418" fill="#d8e1ec">history / show / export</text>
  </g>
  <rect x="72" y="540" width="1056" height="72" rx="6" fill="#050b12" stroke="#334155"/>
  <text x="96" y="584" fill="#f8fafc" font-family="Consolas, monospace" font-size="18">SpyTX&gt; /geo 8.8.8.8</text>
