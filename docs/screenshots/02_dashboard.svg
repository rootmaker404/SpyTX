<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="SpyTX dashboard terminal screenshot">
  <rect width="1200" height="720" fill="#05070a"/>
  <rect x="28" y="24" width="1144" height="672" rx="10" fill="#0b0f14" stroke="#2b3440" stroke-width="2"/>
  <rect x="28" y="24" width="1144" height="42" rx="10" fill="#111923"/>
  <circle cx="56" cy="45" r="7" fill="#ff5f57"/>
  <circle cx="78" cy="45" r="7" fill="#ffbd2e"/>
  <circle cx="100" cy="45" r="7" fill="#28c840"/>
  <text x="600" y="51" fill="#95a3b3" font-family="Consolas, monospace" font-size="15" text-anchor="middle">spytx dashboard</text>
  <text x="72" y="112" fill="#f8fafc" font-family="Consolas, monospace" font-size="28" font-weight="700">SpyTX Command Deck</text>
  <text x="72" y="145" fill="#94a3b8" font-family="Consolas, monospace" font-size="17">public OSINT helpers with strict metadata scope</text>
  <g font-family="Consolas, monospace" font-size="18">
    <rect x="72" y="190" width="316" height="116" rx="6" fill="#101820" stroke="#36a3ff"/>
    <text x="96" y="228" fill="#36a3ff" font-weight="700">[01] IP</text>
    <text x="96" y="262" fill="#cbd5e1">py main.py ip 8.8.8.8</text>
    <rect x="442" y="190" width="316" height="116" rx="6" fill="#101820" stroke="#f05252"/>
    <text x="466" y="228" fill="#f05252" font-weight="700">[02] DOMAIN</text>
    <text x="466" y="262" fill="#cbd5e1">domain | dns | tls | web</text>
    <rect x="812" y="190" width="316" height="116" rx="6" fill="#101820" stroke="#e5e7eb"/>
    <text x="836" y="228" fill="#e5e7eb" font-weight="700">[03] USERNAME</text>
    <text x="836" y="262" fill="#cbd5e1">public profile links</text>
    <rect x="72" y="346" width="316" height="116" rx="6" fill="#101820" stroke="#7dd3fc"/>
    <text x="96" y="384" fill="#7dd3fc" font-weight="700">[04] PHONE</text>
    <text x="96" y="418" fill="#cbd5e1">safe number metadata</text>
    <rect x="442" y="346" width="316" height="116" rx="6" fill="#101820" stroke="#fb7185"/>
    <text x="466" y="384" fill="#fb7185" font-weight="700">[05] REPORTS</text>
    <text x="466" y="418" fill="#cbd5e1">json output by default</text>
    <rect x="812" y="346" width="316" height="116" rx="6" fill="#101820" stroke="#94a3b8"/>
    <text x="836" y="384" fill="#94a3b8" font-weight="700">[06] SCOPE</text>
    <text x="836" y="418" fill="#cbd5e1">public sources only</text>
  </g>
  <rect x="72" y="540" width="1056" height="72" rx="6" fill="#05070a" stroke="#334155"/>
  <text x="96" y="584" fill="#e5e7eb" font-family="Consolas, monospace" font-size="18">spytx&gt; py main.py phone +628123456789</text>
</svg>
